<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Akses QR</title>

  <!-- CSS -->
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
      margin-bottom: 15px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #4facfe;
      box-shadow: 0 0 5px rgba(79,172,254,0.5);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #4facfe;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00c6ff;
    }

    #pesan {
      margin-top: 10px;
      color: red;
      font-size: 14px;
    }

    #qr {
      display: none;
      margin-top: 20px;
      animation: fadeIn 0.8s ease;
    }

    #qr img {
      width: 180px;
      border-radius: 12px;
      border: 4px solid #4facfe;
      margin-top: 10px;
    }

    a.link-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #00c6ff;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 14px;
    }

    a.link-btn:hover {
      background: #009edc;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Masukkan Kodenya bang</h2>

    <input type="text" id="kode" placeholder="Masukkan kode...">
    <button onclick="cekKode()">Masuk</button>

    <p id="pesan"></p>

    <!-- QR & LINK -->
    <div id="qr">
      <h3>Bener bg wkwk</h3>

      <!-- GAMBAR QR -->
      <img src="QR Code.jpeg" alt="QR Code">

      <!-- LINK (opsional) -->
      <br>
      <a href="https://link.dana.id/danakaget?c=sam6ejzvp&r=gLbBZO&orderId=20260322101214954415010300166422969971386" target="_blank" class="link-btn">
        Buka Link
      </a>

      <p>kalo ga bisa scan klik buka link aja</p>
    </div>
  </div>

  <!-- JS -->
  <script>
    function cekKode() {
      const kodeBenar = "250908"; // GANTI KODE DI SINI
      const input = document.getElementById("kode").value;

      if (input === kodeBenar) {
        document.getElementById("qr").style.display = "block";
        document.getElementById("pesan").innerText = "";
      } else {
        document.getElementById("pesan").innerText = "Kode salah!";
      }
    }
  </script>

</body>
</html>
